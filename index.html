<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>吉他顧問 - 2026 典藏版</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['Inter', 'sans-serif'] },
            colors: { gallery: '#121212', bronze: '#C5A059' }
          }
        }
      }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script>
      if (window.Babel) {
        Babel.registerPreset("react-classic", {
          presets: [[Babel.availablePresets.react, { runtime: "classic" }]]
        });
      }
    </script>
    <script type="text/babel" data-presets="react-classic,env">
        const { useState, useEffect, useMemo } = React;

        /* 音訊引擎 */
        const MIDI_OPEN = {6:40, 5:45, 4:50, 3:55, 2:59, 1:64};
        
        let globalAudioCtx = null;
        const getAudioContext = () => {
            if (!globalAudioCtx) {
                globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (globalAudioCtx.state === 'suspended') {
                globalAudioCtx.resume();
            }
            return globalAudioCtx;
        };

        const playNotes = (dots) => {
            const ctx = getAudioContext();
            const now = ctx.currentTime;
            dots.sort((a,b)=>b.string-a.string).forEach((n, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                const midi = MIDI_OPEN[n.string] + n.fret;
                osc.frequency.value = 440 * Math.pow(2, (midi - 69) / 12);
                osc.type = 'triangle';
                osc.connect(gain); 
                gain.connect(ctx.destination);
                const start = now + (i * 0.05);
                gain.gain.setValueAtTime(0, start);
                gain.gain.linearRampToValueAtTime(0.3, start + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, start + 2.5);
                osc.start(start); 
                osc.stop(start + 2.5);
            });
        };

        const NOTES_C = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
        const OPEN_S = {6:4, 5:9, 4:2, 3:7, 2:11, 1:4};
        const DEG_L = { 0: "1", 1: "b2", 2: "2", 3: "b3", 4: "3", 5: "4", 6: "b5", 7: "5", 8: "b6", 9: "6", 10: "b7", 11: "7" };

        const getRequiredIntervals = (intervals, count) => {
            let required = [...intervals];
            if (required.length <= count) return required;
            
            const dropOrder = [7, 2, 5, 9]; // 5th, 9th, 11th, 6th/13th
            for (let d of dropOrder) {
                if (required.includes(d) && required.length > count) {
                    required = required.filter(i => i !== d);
                }
            }
            while (required.length > count) required.pop();
            return required;
        };

        const generateVoicings = (rootPc, typeObj, stringsCount, group, isFriendly = false) => {
            const intervals = typeObj.intervals;
            let sets = [];
            if (stringsCount === 3) {
                if (group === 'root6') sets = [[6,5,4]];
                else if (group === 'root5') sets = [[5,4,3]];
                else if (group === 'mid') sets = [[4,3,2]];
                else if (group === 'high') sets = [[3,2,1]];
            } else {
                if (group === 'root6') sets = [[6,5,4,3]];
                else if (group === 'root5') sets = [[5,4,3,2]];
                else if (group === 'mid' || group === 'high') sets = [[4,3,2,1]];
            }

            const req = getRequiredIntervals(intervals, stringsCount);
            const reqPcs = req.map(i => (rootPc + i) % 12);
            let voicings = [];
            
            sets.forEach(strSet => {
                const build = (strIdx, currentVoicing) => {
                    if (strIdx === strSet.length) {
                        const playedPcs = currentVoicing.map(v => v.pc);
                        if (reqPcs.every(rpc => playedPcs.includes(rpc))) voicings.push(currentVoicing);
                        return;
                    }
                    const s = strSet[strIdx];
                    for (let f = 0; f <= 16; f++) {
                        const pc = (OPEN_S[s] + f) % 12;
                        if (intervals.includes((pc - rootPc + 12) % 12)) {
                            const frets = currentVoicing.map(v => v.fret).filter(fr => fr > 0);
                            if (f > 0) frets.push(f);
                            const maxSpan = isFriendly ? 3 : 4;
                            if (frets.length > 0 && Math.max(...frets) - Math.min(...frets) > maxSpan) continue;
                            if (strIdx === 0 && (group === 'root6' || group === 'root5' || group === 'mid') && stringsCount === 4 && pc !== rootPc) continue;
                            if (strIdx === 0 && stringsCount === 3 && (group === 'root6' || group === 'root5') && pc !== rootPc) continue;
                            
                            build(strIdx + 1, [...currentVoicing, { string: s, fret: f, pc, note: NOTES_C[pc], degree: DEG_L[(pc - rootPc + 12) % 12], isRoot: pc === rootPc }]);
                        }
                    }
                };
                build(0, []);
            });
            
            voicings.sort((a, b) => {
                const avgA = a.reduce((sum, v) => sum + v.fret, 0) / a.length;
                const avgB = b.reduce((sum, v) => sum + v.fret, 0) / b.length;
                return avgA - avgB;
            });
            return voicings;
        };

        /* 指板板塊 - 精確對齊版 */
        const Fretboard = ({ dots, disp }) => (
            <div className="fretboard-frame animate-in">
                <div className="string-labels-side">
                    {[1,2,3,4,5,6].map(s => <div key={s} className="string-tag">{s === 1 ? '1st' : s === 6 ? '6th' : `${s}`}</div>)}
                </div>
                <div className="flex flex-col">
                    <div className="fret-grid-master">
                        {/* 琴枕 */}
                        <div className="fret-col nut">
                            {[1,2,3,4,5,6].map(s => (
                                <div key={s} className="fret-space">
                                    {dots.filter(d=>d.string===s && d.fret===0).map((d,idx) => (
                                        <div key={idx} className={`note-orb ${d.isRoot?'root':''}`} onClick={()=>playNotes([d])}>
                                            {disp==='note' ? d.note : d.degree}
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                        {/* 品格 1-24 */}
                        {Array.from({length: 24}).map((_, f) => {
                            const fret = f + 1;
                            return (
                                <div key={fret} className="fret-col">
                                    {[3,5,7,9,12,15,17,19,21,24].includes(fret) && <div className="inlay-dot"></div>}
                                    {[1,2,3,4,5,6].map(s => (
                                        <div key={s} className="fret-space">
                                            {dots.filter(d=>d.string===s && d.fret===fret).map((d,idx) => (
                                                <div key={idx} className={`note-orb ${d.isRoot?'root':''}`} onClick={()=>playNotes([d])}>
                                                    {disp==='note' ? d.note : d.degree}
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                            );
                        })}
                    </div>
                    <div className="fret-nums-bar">
                        {Array.from({length: 24}).map((_, i) => <div key={i} className="fret-n">{i+1}</div>)}
                    </div>
                </div>
            </div>
        );

        const DetailSheet = ({ root, typeObj, mode, onClose, t, lang }) => {
            const [disp, setDisp] = useState('note');
            const [vMode, setVMode] = useState('arpeggio');
            const [sCount, setSCount] = useState(4);
            const [sGroup, setSGroup] = useState('root6');
            const [vIndex, setVIndex] = useState(0);
            const [isFriendly, setIsFriendly] = useState(false);

            const { dots, availableVoicings } = useMemo(() => {
                const rootPc = NOTES_C.indexOf(root);
                if (mode === 'chord' && vMode === 'voicing') {
                    const vs = generateVoicings(rootPc, typeObj, sCount, sGroup, isFriendly);
                    return { dots: vs[vIndex] || [], availableVoicings: vs.length };
                }

                const res = [];
                for (let s=1; s<=6; s++) {
                    for (let f=0; f<=24; f++) {
                        const pc = (OPEN_S[s] + f) % 12;
                        if (typeObj.intervals.includes((pc - rootPc + 12) % 12)) {
                            res.push({ string: s, fret: f, pc, note: NOTES_C[pc], degree: DEG_L[(pc - rootPc + 12) % 12], isRoot: pc === rootPc });
                        }
                    }
                }
                return { dots: res, availableVoicings: 0 };
            }, [root, typeObj, mode, vMode, sCount, sGroup, vIndex, isFriendly]);

            return (
                <div className="gallery-overlay animate-in">
                    <div className="max-w-6xl mx-auto">
                        <button onClick={onClose} className="mb-12 text-bronze text-[11px] uppercase tracking-[0.4em] flex items-center hover:opacity-50 transition">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" className="mr-2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                            {t.back}
                        </button>
                        <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-10">
                            <div>
                                <div className="catalog-label">{mode==='chord'? t.chord : t.scale}</div>
                                <h2 className="text-6xl font-serif text-white">{root} {lang === 'zh' ? typeObj.zh : (typeObj.en || typeObj.zh)}</h2>
                            </div>
                            <div className="flex flex-col gap-4 items-end">
                                <div className="flex gap-4">
                                    <button onClick={()=>playNotes(dots)} className="minimal-btn">{t.play}</button>
                                    <button onClick={()=>setDisp(disp==='note'?'deg':'note')} className="minimal-btn">
                                        {lang === 'zh' ? (disp === 'note' ? '顯示度數' : '顯示音名') : (disp === 'note' ? 'Show Degrees' : 'Show Notes')}
                                    </button>
                                </div>
                                {mode === 'chord' && (
                                    <div className="flex bg-white/5 rounded-full p-1 mt-2">
                                        <button onClick={()=>setVMode('arpeggio')} className={`px-4 py-1.5 text-[10px] uppercase tracking-widest rounded-full transition-all ${vMode==='arpeggio'?'bg-bronze text-black':'text-white hover:bg-white/10'}`}>
                                            {lang==='zh'?'琶音全景':'Arpeggio'}
                                        </button>
                                        <button onClick={()=>{setVMode('voicing'); setVIndex(0);}} className={`px-4 py-1.5 text-[10px] uppercase tracking-widest rounded-full transition-all ${vMode==='voicing'?'bg-bronze text-black':'text-white hover:bg-white/10'}`}>
                                            {lang==='zh'?'具體按法':'Voicing'}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>

                        {mode === 'chord' && vMode === 'voicing' && (
                            <div className="flex flex-col md:flex-row gap-6 mb-12 border-y border-white/5 py-6 items-center justify-between">
                                <div className="flex gap-4 items-center">
                                    <span className="text-[10px] text-zinc-500 uppercase tracking-widest">{lang==='zh'?'指型弦數':'Strings'}:</span>
                                    {[3, 4].map(c => (
                                        <button key={c} onClick={()=>{setSCount(c); setVIndex(0);}} className={`text-[11px] px-3 py-1 border transition-all ${sCount===c?'text-bronze border-bronze':'text-zinc-600 border-transparent hover:text-zinc-400'}`}>
                                            {c} {lang==='zh'?'弦':'Str'}
                                        </button>
                                    ))}
                                    <button onClick={()=>{setIsFriendly(!isFriendly); setVIndex(0);}} className={`text-[11px] px-3 py-1 border transition-all ml-2 ${isFriendly?'text-bronze border-bronze bg-bronze/10':'text-zinc-600 border-zinc-800 hover:text-zinc-400'}`}>
                                        {lang==='zh'?'友好模式':'Friendly'}
                                    </button>
                                </div>
                                <div className="flex gap-4 overflow-x-auto no-scrollbar">
                                    {(sCount === 3 ? [
                                        {id:'root6', label: lang==='zh'?'第 6-5-4 弦':'Strings 6-5-4'},
                                        {id:'root5', label: lang==='zh'?'第 5-4-3 弦':'Strings 5-4-3'},
                                        {id:'mid', label: lang==='zh'?'第 4-3-2 弦':'Strings 4-3-2'},
                                        {id:'high', label: lang==='zh'?'第 3-2-1 弦':'Strings 3-2-1'}
                                    ] : [
                                        {id:'root6', label: lang==='zh'?'根音在第6弦':'Root on 6th'},
                                        {id:'root5', label: lang==='zh'?'根音在第5弦':'Root on 5th'},
                                        {id:'mid', label: lang==='zh'?'根音在第4弦':'Root on 4th'}
                                    ]).map(g => (
                                        <button key={g.id} onClick={()=>{setSGroup(g.id); setVIndex(0);}} className={`whitespace-nowrap text-[11px] tracking-widest pb-1 border-b transition-all ${sGroup===g.id?'text-bronze border-bronze':'text-zinc-700 border-transparent hover:text-zinc-500'}`}>
                                            {g.label}
                                        </button>
                                    ))}
                                </div>
                                {availableVoicings > 0 ? (
                                    <div className="flex items-center gap-4 text-[11px] tracking-widest text-zinc-400">
                                        <button onClick={()=>setVIndex(v => Math.max(0, v-1))} disabled={vIndex===0} className="hover:text-white disabled:opacity-30">&larr;</button>
                                        <span>{lang==='zh'?'變體':'Variant'} {vIndex + 1} / {availableVoicings}</span>
                                        <button onClick={()=>setVIndex(v => Math.min(availableVoicings-1, v+1))} disabled={vIndex===availableVoicings-1} className="hover:text-white disabled:opacity-30">&rarr;</button>
                                    </div>
                                ) : (
                                    <div className="text-[11px] tracking-widest text-red-400">{lang==='zh'?'無適合按法':'No Voicing Found'}</div>
                                )}
                            </div>
                        )}

                        <Fretboard dots={dots} disp={disp} />
                    </div>
                </div>
            );
        };

        function App() {
            const [db, setDb] = useState(null);
            const [mode, setMode] = useState('chord');
            const [catId, setCatId] = useState(null);
            const [typeObj, setTypeObj] = useState(null);
            const [detail, setDetail] = useState(null);
            const [lang, setLang] = useState('zh');
            const [isLight, setIsLight] = useState(false);

            useEffect(() => {
                const TEXT = {
                    zh: {
                        title: "吉他顧問", edition: "典藏版", chord: "和弦", scale: "音階",
                        bassPos: "低把位", highPos: "高把位", categories: "返回類別", back: "返回",
                        formula: "結構", position: "把位", notes: "音符數", root: "根音",
                        chordTone: "組成音", scaleNote: "音階音", string: "弦", fret: "品",
                        note: "音名", degree: "度數", copy: "複製座標", copied: "已複製！",
                        topStr: "上方為第 1 弦 (高音)", dispNote: "顯示音名", dispDeg: "顯示度數", play: "播放試聽",
                        cat: {
                           triads: "三和弦系列", sixths: "六和弦系列", sevenths: "七和弦系列", dom_plus: "進階屬七和弦",
                           ninths: "九和弦系列", elevenths: "十一和弦系列", thirteenths: "十三和弦系列", tenths: "第十音系列",
                           added: "加音和弦系列", no35: "省略音和弦", special: "特殊風格系列",
                           basic: "基礎與五聲音階", modes: "自然調式系列", jazz: "爵士與旋律小調",
                           sym: "對稱音階系列", exotic: "異國風情系列"
                        }
                    },
                    en: {
                        title: "Guitar Advisor", edition: "Collector's Ed.", chord: "Chords", scale: "Scales",
                        bassPos: "Bass Pos.", highPos: "High Pos.", categories: "Categories", back: "Back",
                        formula: "Formula", position: "Pos.", notes: "Notes", root: "Root",
                        chordTone: "Tones", scaleNote: "Notes", string: "Str", fret: "Fret",
                        note: "Note", degree: "Degree", copy: "Copy", copied: "Copied!",
                        topStr: "Top is 1st String", dispNote: "Show Notes", dispDeg: "Show Degrees", play: "Play",
                        cat: {
                           triads: "Triads", sixths: "Sixths", sevenths: "Sevenths", dom_plus: "Dom. Altered",
                           ninths: "Ninths", elevenths: "Elevenths", thirteenths: "Thirteenths", tenths: "Tenths",
                           added: "Add Chords", no35: "No 3/5", special: "Special Styles",
                           basic: "Basic & Penta", modes: "Modes", jazz: "Jazz & Melodic",
                           sym: "Symmetric", exotic: "Exotic"
                        }
                    }
                };

                const mk = (id, label, zh, formula, intervals) => ({ id, label, zh, en:zh, formula, intervals });

                const CHORD_TYPES = [
                    mk("Maj","Maj","大三和弦","1-3-5",[0,4,7]), mk("m","m","小三和弦","1-b3-5",[0,3,7]),
                    mk("dim","dim","減三和弦","1-b3-b5",[0,3,6]), mk("aug","aug","增三和弦","1-3-#5",[0,4,8]),
                    mk("sus2","sus2","掛二和弦","1-2-5",[0,2,7]), mk("sus4","sus4","掛四和弦","1-4-5",[0,5,7]),
                    mk("6","6","大六和弦","1-3-5-6",[0,4,7,9]), mk("m6","m6","小六和弦","1-b3-5-6",[0,3,7,9]),
                    mk("69","6/9","六九和弦","1-3-5-6-9",[0,4,7,9,2]), mk("m69","m6/9","小六九","1-b3-5-6-9",[0,3,7,9,2]),
                    mk("Maj7","Maj7","大七和弦","1-3-5-7",[0,4,7,11]), mk("7","7","屬七和弦","1-3-5-b7",[0,4,7,10]),
                    mk("m7","m7","小七和弦","1-b3-5-b7",[0,3,7,10]), mk("mMaj7","m(maj7)","小大七和弦","1-b3-5-7",[0,3,7,11]),
                    mk("m7b5","m7b5","半減七和弦","1-b3-b5-b7",[0,3,6,10]), mk("dim7","dim7","減七和弦","1-b3-b5-bb7",[0,3,6,9]),
                    mk("aug7","+7","增屬七和弦","1-3-#5-b7",[0,4,8,10]), mk("7alt","7alt","變化屬七","1-3-b7-alt",[0,4,10,1,3,8]),
                    mk("7sus4","7sus4","屬七掛四","1-4-5-b7",[0,5,7,10]), mk("9","9","屬九和弦","1-3-5-b7-9",[0,4,7,10,2]),
                    mk("Maj9","Maj9","大九和弦","1-3-5-7-9",[0,4,7,11,2]), mk("m9","m9","小九和弦","1-b3-5-b7-9",[0,3,7,10,2]),
                    mk("11","11","屬十一和弦","1-3-5-b7-9-11",[0,4,7,10,2,5]), mk("13","13","屬十三和弦","1-3-5-b7-9-13",[0,4,7,10,2,9]),
                    mk("add9","add9","加九和弦","1-3-5-9",[0,4,7,2]), mk("sus2sus4","雙掛留","1-2-4-5",[0,2,5,7]),
                    mk("Maj7#11","Maj7#11","大七升十一","1-3-5-7-#11",[0,4,7,11,6]), mk("m11","m11","小十一和弦","1-b3-5-b7-9-11",[0,3,7,10,2,5]),
                    mk("13b9","13b9","十三降九","1-3-5-b7-b9-13",[0,4,7,10,1,9]), mk("7b9","7b9","屬七降九","1-3-5-b7-b9",[0,4,7,10,1]),
                    mk("7#9","7#9","屬七升九","1-3-5-b7-#9",[0,4,7,10,3]), mk("7b13","7b13","屬七降十三","1-3-5-b7-b13",[0,4,7,10,8]),
                    mk("Maj13","Maj13","大十三和弦","1-3-5-7-9-13",[0,4,7,11,2,9]), mk("m13","m13","小十三和弦","1-b3-5-b7-9-13",[0,3,7,10,2,9]),
                    mk("m9b5","m9b5","半減九和弦","1-b3-b5-b7-9",[0,3,6,10,2]), mk("dimMaj7","dimMaj7","減大七和弦","1-b3-b5-7",[0,3,6,11])
                ];

                const CHORD_CATEGORIES = [
                    {id:"triads", key:"triads", list:["Maj","m","dim","aug","sus2","sus4"]},
                    {id:"sixths", key:"sixths", list:["6","m6","69","m69"]},
                    {id:"sevenths", key:"sevenths", list:["Maj7","7","m7","mMaj7","m7b5","dim7","aug7","Maj7#11","dimMaj7"]},
                    {id:"dom_plus", key:"dom_plus", list:["7alt","7sus4","7b9","7#9","7b13"]},
                    {id:"ninths", key:"ninths", list:["9","Maj9","m9","m9b5"]},
                    {id:"elevenths", key:"elevenths", list:["11","m11"]},
                    {id:"thirteenths", key:"thirteenths", list:["13","Maj13","m13","13b9"]},
                    {id:"added", key:"added", list:["add9"]},
                    {id:"special", key:"special", list:["sus2sus4"]}
                ];

                const SCALES = [
                    {id:"major", zh:"大調音階 (Ionian)", en:"Major", intervals:[0,2,4,5,7,9,11]},
                    {id:"minor", zh:"自然小調 (Aeolian)", en:"Natural Minor", intervals:[0,2,3,5,7,8,10]},
                    {id:"h_minor", zh:"和聲小調", en:"Harmonic Minor", intervals:[0,2,3,5,7,8,11]},
                    {id:"m_minor", zh:"旋律小調", en:"Melodic Minor", intervals:[0,2,3,5,7,9,11]},
                    {id:"maj_penta", zh:"大調五聲", en:"Major Pentatonic", intervals:[0,2,4,7,9]},
                    {id:"min_penta", zh:"小調五聲", en:"Minor Pentatonic", intervals:[0,3,5,7,10]},
                    {id:"blues", zh:"藍調音階", en:"Blues", intervals:[0,3,5,6,7,10]},
                    {id:"dorian", zh:"多利安調式", en:"Dorian", intervals:[0,2,3,5,7,9,10]},
                    {id:"mixolydian", zh:"混合利底安", en:"Mixolydian", intervals:[0,2,4,5,7,9,10]},
                    {id:"altered", zh:"超洛克里安", en:"Altered", intervals:[0,1,3,4,6,8,10]}
                ];

                const SCALE_CATEGORIES = [
                    {id:"basic", key:"basic", list:["major","minor","h_minor","m_minor","maj_penta","min_penta","blues"]},
                    {id:"modes", key:"modes", list:["dorian","mixolydian"]},
                    {id:"jazz", key:"jazz", list:["altered"]}
                ];

                setDb({
                    c: { TEXT },
                    ch: { CHORD_TYPES, CHORD_CATEGORIES },
                    sc: { SCALES, SCALE_CATEGORIES }
                });
            }, []);

            useEffect(() => {
                if (isLight) document.body.classList.add('light-mode');
                else document.body.classList.remove('light-mode');
            }, [isLight]);

            if (!db) return <div className="h-screen flex items-center justify-center text-bronze tracking-[0.5em] text-[11px]">LOADING...</div>;
            const t = db.c.TEXT[lang] || db.c.TEXT['zh'];

            const renderMain = () => {
                if (!catId) {
                    const list = mode === 'chord' ? db.ch.CHORD_CATEGORIES : db.sc.SCALE_CATEGORIES;
                    return (
                        <div className="max-w-3xl mx-auto mt-20 animate-in">
                            <div className="catalog-label text-center mb-10">{lang==='zh'?'分類目錄':'Categories'}</div>
                            {list.map((c, i) => (
                                <div key={c.id} onClick={()=>setCatId(c.id)} className="gallery-list-item">
                                    <h3 className="font-serif">{t.cat[c.key] || c.id}</h3>
                                    <span className="text-bronze opacity-50 text-[10px] tracking-widest uppercase">{lang==='zh'?'選擇':'Select'}</span>
                                </div>
                            ))}
                        </div>
                    );
                }
                if (!typeObj) {
                    const cat = (mode === 'chord' ? db.ch.CHORD_CATEGORIES : db.sc.SCALE_CATEGORIES).find(x => x.id === catId);
                    const items = mode === 'chord' ? db.ch.CHORD_TYPES.filter(it => cat.list.includes(it.id)) : db.sc.SCALES.filter(it => cat.list.includes(it.id));
                    return (
                        <div className="max-w-3xl mx-auto mt-20 animate-in">
                            <button onClick={()=>setCatId(null)} className="mb-12 text-bronze text-[11px] uppercase tracking-[0.4em] flex items-center hover:opacity-50 transition">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" className="mr-2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                                {t.back}
                            </button>
                            <div className="catalog-label mb-8">{t.cat[cat.key]}</div>
                            {items.map((it, i) => (
                                <div key={it.id} onClick={()=>setTypeObj(it)} className="gallery-list-item">
                                    <div className="flex flex-col">
                                        <span className="text-white text-xl font-serif">{lang==='zh'? it.zh : (it.en || it.zh)}</span>
                                        <span className="text-[10px] text-zinc-600 tracking-widest mt-1 uppercase font-mono">{it.formula || it.id}</span>
                                    </div>
                                    <span className="text-[10px] text-bronze/40 font-mono">#{String(i+1).padStart(3,'0')}</span>
                                </div>
                            ))}
                        </div>
                    );
                }
                return (
                    <div className="max-w-4xl mx-auto mt-20 text-center animate-in">
                        <button onClick={()=>setTypeObj(null)} className="mb-12 text-bronze text-[11px] uppercase tracking-[0.4em] flex items-center justify-center hover:opacity-50 transition mx-auto">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" className="mr-2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                            {t.back}
                        </button>
                        <div className="catalog-label">{lang==='zh'?'選擇根音':'Select Root'}</div>
                        <h2 className="text-5xl text-white mb-20 font-serif">{lang==='zh'? typeObj.zh : (typeObj.en || typeObj.zh)}</h2>
                        <div className="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-6 gap-6">
                            {NOTES_C.map((n, i) => (
                                <button key={n} onClick={()=>setDetail({root:n, typeObj, mode})} className="border border-white/5 py-12 text-white font-serif text-2xl hover:border-bronze hover:text-bronze transition-all">
                                    {n}
                                </button>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen pb-40">
                    <div className="fixed top-8 right-8 flex gap-4 z-[1000] animate-in">
                        <button className={`utility-btn ${lang==='zh'?'active':''}`} onClick={()=>setLang('zh')}>ZH</button>
                        <button className={`utility-btn ${lang==='en'?'active':''}`} onClick={()=>setLang('en')}>EN</button>
                        <div className="w-4"></div>
                        <button className="utility-btn" onClick={()=>setIsLight(!isLight)}>
                            {isLight ? 'DARK' : 'LIGHT'}
                        </button>
                    </div>
                    <header className="gallery-header animate-in">
                        <h1 className="gallery-title">{t.title}</h1>
                        <div className="edition-label">{t.edition} / 2026 典藏版</div>
                        <div className="mt-16 flex justify-center gap-16">
                            <button onClick={()=>{setMode('chord'); setCatId(null); setTypeObj(null);}} className={`text-[13px] tracking-[0.4em] pb-2 border-b-2 transition-all ${mode==='chord'?'text-bronze border-bronze':'text-zinc-800 border-transparent'}`}>{t.chord}</button>
                            <button onClick={()=>{setMode('scale'); setCatId(null); setTypeObj(null);}} className={`text-[13px] tracking-[0.4em] pb-2 border-b-2 transition-all ${mode==='scale'?'text-bronze border-bronze':'text-zinc-800 border-transparent'}`}>{t.scale}</button>
                        </div>
                    </header>
                    <main>{renderMain()}</main>
                    {detail && <DetailSheet {...detail} onClose={()=>setDetail(null)} t={t} lang={lang} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
